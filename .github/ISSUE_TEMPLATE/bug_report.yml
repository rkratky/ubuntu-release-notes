name: Add a release note (WIP)
description: Add a new Ubuntu release note
labels:
  - 'New release note'
assignees:
  - msuchane
body:
- type: dropdown
  attributes:
    label: Ubuntu release
    description: Which Ubuntu release is affected by this change?
    options:
      - '25.10'
      - '26.04 LTS'
      - '26.10'
      - '27.04'
      - '27.10'
      - Other (specify in the description)
  validations:
    required: true
- type: checkboxes
  attributes:
    label: Is there an existing issue for this?
    description: |
      Please search to see if an issue already exists for this feature: https://github.com/canonical/desktop-security-center/issues.
    options:
    - label: I have searched the existing issues
      required: true
- type: textarea
  attributes:
    label: Describe the bug
    description: |
      A clear and concise description of what the bug is. You can also attach screenshots or recordings.
  validations:
    required: false
- type: textarea
  attributes:
    label: Steps to reproduce the behavior
    placeholder: |
      1. Go to '...'
      2. Click on '....'
      3. Scroll down to '....'
      4. See error
  validations:
    required: false
- type: textarea
  id: expected_behavior
  attributes:
    label: Expected behavior
    description: |
      A clear and concise description of what you expected to happen.
  validations:
    required: false
- type: dropdown
  attributes:
    label: Ubuntu release
    description: What version of our Ubuntu are you running?
    options:
      - '24.10'
      - 24.04 LTS
      - Other (specify in the last field)
  validations:
    required: false
- type: dropdown
  attributes:
    label: What architecture are you using?
    multiple: false
    options:
      - amd64
      - arm64
      - Other (specify in the last field)
      - I don't know
  validations:
    required: false
- type: textarea
  attributes:
    label: System info
    description: |
      Please run this command in your terminal:
      ```uname -rv && snap info snapd prompting-client desktop-security-center```
      and paste the output here. It will give us information about your system such as the kernel version and the versions of the relevant packages.
  validations:
    required: false
- type: textarea
  attributes:
    label: Additional context
    description: |
      You can attach screenshots, recordings, logs, or any other information that you think might be helpful. Please remember to anonymize any personal data.
  validations:
    required: false
